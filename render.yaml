databases:
  - name: realestate-db
    plan: free
    databaseName: realestate
    user: realestate

services:
  - type: web
    name: realestate-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: realestate-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ECOS_API_KEY
        value: S94WSHTRI7AMBSTW8TPV
      - key: CORS_ORIGINS
        value: '["https://realestate-frontend.onrender.com","http://localhost:3000"]'
    healthCheckPath: /health

  - type: web
    name: realestate-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        value: https://realestate-backend.onrender.com
